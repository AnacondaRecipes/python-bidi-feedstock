{% set name = "python-bidi" %}
{% set version = "0.6.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c10065081c0e137975de5d9ba2ff2306286dbf5e0c586d4d5aec87c856239b41

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - pybidi = bidi:main

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("rust") }}
  host:
    - python
    - pip
    - maturin >=1,<2
  run:
    - python

test:
  source_files:
    - tests
  imports:
    - bidi
    - bidi.algorithm
  requires:
    - pip
    - pytest
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests
    - pybidi --help

about:
  home: https://github.com/MeirKriheli/python-bidi
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file:
    - COPYING
    - COPYING.LESSER
  summary: Pure python implementation of the BiDi layout algorithm
  description: Bi-directional (BiDi) layout implementation in pure python
  doc_url: https://python-bidi.readthedocs.io
  dev_url: https://github.com/MeirKriheli/python-bidi

extra:
  recipe-maintainers:
    - kastman
